Name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.7"

      - name: Force Gradle Wrapper 8.7
        run: gradle wrapper --gradle-version 8.7

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        # ⚡ CIRUGÍA: Agregamos 'clean' para forzar reconstrucción total y evitar errores de Seeds/Cache
        run: ./gradlew clean assembleDebug --stacktrace --no-daemon

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: vespa-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            app/build/outputs/
            app/build/reports/
          retention-days: 7

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: vespa-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            app/build/outputs/
            app/build/reports/
          retention-days: 7

    
